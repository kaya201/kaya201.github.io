<!DOCTYPE html>
<html>
<head><title>Code TikTok reçu</title></head>
<body style="font-family: sans-serif; padding: 40px;">
  <h2>Voici votre code d'autorisation :</h2>
  <p id="code" style="font-size: 18px; word-break: break-all; background: #eee; padding: 10px;"></p>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("code").textContent = params.get("code") || "Aucun code trouvé dans l'URL";
  </script>
</body>
</html>
